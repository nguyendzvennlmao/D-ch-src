name: Decompile DonutCore Fixed

on:
  workflow_dispatch:

jobs:
  decompile-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          VERSION="1.5.0"
          wget https://github.com/skylot/jadx/releases/download/v${VERSION}/jadx-${VERSION}.zip
          unzip jadx-${VERSION}.zip -d jadx_bin
          chmod +x jadx_bin/bin/jadx

      - name: Decompile JAR (Optimized)
        run: |
          # Tạo thư mục src
          mkdir -p src/main/java
          
          # Chạy JADX với các tham số tối ưu:
          # --no-res: Bỏ qua dịch ngược tài nguyên (để tránh treo)
          # --no-imports: Để code gọn hơn (nếu cần)
          # -r: Giữ nguyên cấu trúc package
          ./jadx_bin/bin/jadx DonutCore-1.1.3.jar \
            -d src/main/java \
            --no-res \
            --no-debug-info \
            --comments-level none

      - name: Commit and Push Source
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tạo branch mới
          git checkout -b decompile-source-fixed
          
          # Dọn dẹp các tệp công cụ trước khi push
          rm -rf jadx_bin jadx-1.5.0.zip
          
          git add .
          git commit -m "Fixed decompile DonutCore using JADX"
          git push origin decompile-source-fixed --force
