name: Decompile DonutCore

on:
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công

jobs:
  decompile-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cho phép GitHub Actions đẩy code vào repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download CFR Decompiler
        run: |
          wget https://github.com/leibnitz27/cfr/releases/download/0.152/cfr-0.152.jar -O cfr.jar

      - name: Decompile JAR File
        run: |
          # Tạo thư mục chứa mã nguồn
          mkdir -p src/main/java
          # Chạy lệnh dịch ngược (đảm bảo file DonutCore-1.1.3.jar nằm ở thư mục gốc repo)
          java -jar cfr.jar DonutCore-1.1.3.jar --outputdir ./src/main/java

      - name: Commit and Push Source Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tạo branch mới để chứa mã nguồn đã dịch
          git checkout -b decompile-source
          
          # Xóa các file không cần thiết trước khi commit
          rm cfr.jar
          
          git add .
          git commit -m "Auto decompile DonutCore to source"
          git push origin decompile-source --force
