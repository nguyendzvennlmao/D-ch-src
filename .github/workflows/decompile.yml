name: Aris Network - License Explorer

on:
  workflow_dispatch:

jobs:
  explore-license:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          VERSION="1.5.0"
          wget https://github.com/skylot/jadx/releases/download/v${VERSION}/jadx-${VERSION}.zip
          unzip jadx-${VERSION}.zip -d jadx_bin
          chmod +x jadx_bin/bin/jadx

      - name: Decompile Target Class
        run: |
          mkdir -p decompiled_logic
          # Tập trung vào package com.hapangama để tránh treo máy
          ./jadx_bin/bin/jadx DonutCore-1.1.3.jar \
            -d decompiled_logic \
            --include-only "com.hapangama.**" \
            --no-res \
            --show-bad-code \
            --comments-level debug

      - name: Push to Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Đẩy vào branch 'mo-code-license'
          git checkout -b mo-code-license
          cp -r decompiled_logic/* .
          rm -rf jadx_bin jadx-1.5.0.zip decompiled_logic
          
          git add .
          git commit -m "Exported SunLicenseAPI for analysis"
          git push origin mo-code-license --force
