name: Aris Network - Decompile DonutCore

on:
  workflow_dispatch: # Chạy thủ công bằng nút bấm

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX (Trình dịch ngược mạnh nhất)
        run: |
          VERSION="1.5.0"
          wget https://github.com/skylot/jadx/releases/download/v${VERSION}/jadx-${VERSION}.zip
          unzip jadx-${VERSION}.zip -d jadx_bin
          chmod +x jadx_bin/bin/jadx

      - name: Decompile JAR (Chỉ lấy code chính)
        run: |
          mkdir -p src_output
          # Lệnh này chỉ lấy gói com.kammoun để tránh bị treo bởi các thư viện đi kèm
          ./jadx_bin/bin/jadx DonutCore-1.1.3.jar \
            -d src_output \
            --include-only "com.kammoun.**" \
            --no-res \
            --no-debug-info

      - name: Create Zip for Download
        run: |
          zip -r DonutCore_Source.zip src_output/

      - name: Upload Artifact (Hiện nút tải xuống)
        uses: actions/upload-artifact@v4
        with:
          name: DonutCore-Source-Files
          path: DonutCore_Source.zip
          retention-days: 7

      - name: Push to Branch (Để xem online)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b decompile-result
          cp -r src_output/* .
          rm -rf jadx_bin jadx-1.5.0.zip DonutCore_Source.zip
          git add .
          git commit -m "Auto decompile DonutCore"
          git push origin decompile-result --force
