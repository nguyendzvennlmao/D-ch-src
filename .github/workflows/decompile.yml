name: Decompile JAR to Source

on: 
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download CFR Decompiler
        run: |
          wget https://github.com/leibnitz27/cfr/releases/download/0.152/cfr-0.152.jar -O cfr.jar

      - name: Decompile JAR
        run: |
          # Thay 'your-file.jar' bằng tên file của bạn
          mkdir -p src_decompiled
          java -jar cfr.jar your-file.jar --outputdir ./src_decompiled

      - name: Upload Source as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-source
          path: src_decompiled/

      # (Tùy chọn) Đẩy code trực tiếp lên một branch mới tên là 'source-code'
      - name: Commit and Push Source
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b source-code
          cp -r src_decompiled/* .
          rm cfr.jar your-file.jar # Dọn dẹp file thừa
          git add .
          git commit -m "Auto decompile jar to src"
          git push origin source-code --force
