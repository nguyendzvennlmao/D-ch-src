name: Aris Network - License Deep Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          VERSION="1.5.0"
          wget https://github.com/skylot/jadx/releases/download/v${VERSION}/jadx-${VERSION}.zip
          unzip jadx-${VERSION}.zip -d jadx_bin
          chmod +x jadx_bin/bin/jadx

      - name: Decompile Target Class (Deep Mode)
        run: |
          mkdir -p output_java
          # Sử dụng các tham số hỗ trợ "mò" code tối đa
          ./jadx_bin/bin/jadx DonutCore-1.1.3.jar \
            -d output_java \
            --include-only "com.hapangama.**" \
            --no-res \
            --show-bad-code \
            --comments-level debug \
            --deobf false

      - name: Push Source to Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Đẩy vào branch chuyên biệt để bạn vào xem file .java
          git checkout -b license-analysis-branch
          cp -r output_java/sources/* .
          rm -rf jadx_bin jadx-1.5.0.zip output_java
          
          git add .
          git commit -m "Exported SunLicenseAPI for cracking analysis"
          git push origin license-analysis-branch --force
