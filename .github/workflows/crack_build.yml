name: Aris Network - Build Crack

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Inject
        run: |
          # 1. Tạo thư mục build
          mkdir -p output
          
          # 2. Biên dịch file Java sang Class
          javac -d output src/com/hapangama/SunLicenseAPI.java
          
          # 3. Chèn file Class mới vào file JAR gốc
          # Lệnh 'jar uf' sẽ ghi đè class mới vào đúng vị trí trong JAR
          cd output
          jar uf ../DonutCore-1.1.3.jar com/hapangama/*.class

      - name: Upload Cracked File
        uses: actions/upload-artifact@v4
        with:
          name: DonutCore-Crack-VennLMAO
          path: DonutCore-1.1.3.jar
