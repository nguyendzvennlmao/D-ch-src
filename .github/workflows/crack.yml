name: Aris Network - Build Crack

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Inject
        run: |
          mkdir -p output
          javac -d output src/com/hapangama/SunLicenseAPI.java
          cd output
          jar uf ../DonutCore-1.1.3.jar com/hapangama/*.class

      - name: Upload Cracked File
        uses: actions/upload-artifact@v4
        with:
          name: DonutCore-Cracked
          path: DonutCore-1.1.3.jar
