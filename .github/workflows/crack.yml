name: Build and Inject DonutCore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        [cite_start]uses: actions/checkout@v4 [cite: 1]

      - name: Set up JDK 17
        [cite_start]uses: actions/setup-java@v4 [cite: 1, 8]
        with:
          [cite_start]java-version: '17' [cite: 8]
          [cite_start]distribution: 'temurin' [cite: 8]

      - name: Compile and Inject
        run: |
          # 1. Tạo thư mục làm việc sạch sẽ
          mkdir -p staging
          mkdir -p output
          
          # 2. Giải nén file JAR gốc vào staging (Sử dụng unzip để tránh lỗi kén Module của jar uf)
          # Đảm bảo file DonutCore-1.1.3.jar nằm ở thư mục gốc của repo
          unzip DonutCore-1.1.3.jar -d staging
          
          # 3. Biên dịch code Java mới vào staging
          # Thêm -cp staging để javac nhận diện được các class cũ trong file gốc
          [cite_start]javac -cp "staging" -d staging src/com/hapangama/SunLicenseAPI.java [cite: 9, 14]
          
          # 4. Đóng gói lại toàn bộ thư mục staging thành file JAR mới
          cd staging
          jar cvf ../output/DonutCore-Fixed.jar .
          cd ..
          
          echo "Build hoàn tất: output/DonutCore-Fixed.jar"

      - name: Upload Artifact
        [cite_start]uses: actions/upload-artifact@v4 [cite: 1]
        with:
          name: DonutCore-Fixed
          path: output/DonutCore-Fixed.jar
