name: Build and Inject DonutCore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Dependencies
        run: |
          mkdir -p libs
          # Tải Spigot API để làm thư viện biên dịch (Sửa lỗi thiếu org.bukkit và javax.servlet)
          curl -L -o libs/spigot-api.jar https://hub.spigotmc.org/nexus/content/repositories/snapshots/org/spigotmc/spigot-api/1.20.1-R0.1-SNAPSHOT/spigot-api-1.20.1-R0.1-20230626.084534-19.jar

      - name: Compile and Inject
        run: |
          mkdir -p staging
          mkdir -p output
          unzip -o DonutCore-1.1.3.jar -d staging
          # Thêm libs/spigot-api.jar vào classpath (-cp) để javac không báo lỗi thiếu package
          javac -cp "staging:libs/spigot-api.jar" -d staging src/com/hapangama/SunLicenseAPI.java
          cd staging
          jar cvf ../output/DonutCore-Fixed.jar .
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DonutCore-Fixed
          path: output/DonutCore-Fixed.jar
