name: Build and Inject DonutCore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        [cite_start]uses: actions/checkout@v4 [cite: 1, 2]

      - name: Set up JDK 17
        [cite_start]uses: actions/setup-java@v4 [cite: 1, 8]
        with:
          java-version: '17'
          [cite_start]distribution: 'temurin' [cite: 8]

      - name: Compile and Inject
        run: |
          mkdir -p staging
          mkdir -p output
          unzip DonutCore-1.1.3.jar -d staging
          javac -cp "staging" -d staging src/com/hapangama/SunLicenseAPI.java [cite: 9, 14]
          cd staging
          jar cvf ../output/DonutCore-Fixed.jar .
          cd ..

      - name: Upload Artifact
        [cite_start]uses: actions/upload-artifact@v4 [cite: 1]
        with:
          name: DonutCore-Fixed
          path: output/DonutCore-Fixed.jar
