name: Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compile
        run: |
          mkdir -p bin
          javac -cp "DonutCore-1.1.3.jar" -d bin src/com/hapangama/SunLicenseAPI.java
      - uses: actions/upload-artifact@v4
        with:
          name: ClassFile
          path: bin/com/hapangama/
