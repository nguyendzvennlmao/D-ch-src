name: Build and Inject DonutCore

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Inject
        run: |
          mkdir -p staging
          mkdir -p output
          unzip DonutCore-1.1.3.jar -d staging
          javac -cp "staging" -d staging src/com/hapangama/SunLicenseAPI.java
          cd staging
          jar cvf ../output/DonutCore-Fixed.jar .
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DonutCore-Fixed
          path: output/DonutCore-Fixed.jar
